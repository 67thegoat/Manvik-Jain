<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🎮 Game Hub</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<!-- WELCOME -->
<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<!-- GAMES ON HOME PAGE -->
<h2>🔥 Popular Games</h2>

<div class="games">

  <div class="card" onclick="openGame('Obby')">
    <h3>🔥 Obby</h3>
    <p>Jump through obstacles!</p>
  </div>

  <div class="card" onclick="openGame('Racing')">
    <h3>🏎️ Racing</h3>
    <p>Fast multiplayer racing!</p>
  </div>

  <div class="card" onclick="openGame('Battle')">
    <h3>⚔️ Battle</h3>
    <p>Fight other players!</p>
  </div>

</div>

<script src="script.js"></script>

<script>
let user = getUser();

if (!user) {
  window.location.href = "login.html";
} else {
  document.getElementById("welcome").innerText =
    "Welcome " + user + "!";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>3D Game</title>

<style>
body{
  margin:0;
  overflow:hidden;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js';

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);

light.position.set(5,10,7);

scene.add(light);

const floorGeometry = new THREE.BoxGeometry(20,1,20);

const floorMaterial = new THREE.MeshStandardMaterial({
color:0x00aa00
});

const floor = new THREE.Mesh(
floorGeometry,
floorMaterial
);

floor.position.y=-1;

scene.add(floor);

const playerGeometry = new THREE.BoxGeometry(1,1,1);

const playerMaterial = new THREE.MeshStandardMaterial({
color:0xff0000
});

const player = new THREE.Mesh(
playerGeometry,
playerMaterial
);

scene.add(player);

camera.position.z=5;
camera.position.y=3;

document.addEventListener('keydown',(e)=>{

  if(e.key=="ArrowUp") player.position.z-=0.3;

  if(e.key=="ArrowDown") player.position.z+=0.3;

  if(e.key=="ArrowLeft") player.position.x-=0.3;

  if(e.key=="ArrowRight") player.position.x+=0.3;

});

function animate(){

  requestAnimationFrame(animate);

  camera.position.x = player.position.x;

  camera.position.z = player.position.z + 5;

  camera.lookAt(player.position);

  renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>

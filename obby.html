<!DOCTYPE html>
<html>
<head>
<title>3D Obby</title>

<style>
body{
  margin:0;
  overflow:hidden;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js';

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);

light.position.set(10,20,10);

light.castShadow = true;

scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.4);

scene.add(ambient);

const floorGeo = new THREE.BoxGeometry(50,1,50);

const floorMat = new THREE.MeshStandardMaterial({
color:0x00aa00
});

const floor = new THREE.Mesh(floorGeo,floorMat);

floor.receiveShadow = true;

floor.position.y = -1;

scene.add(floor);

const playerGeo = new THREE.BoxGeometry(1,2,1);

const playerMat = new THREE.MeshStandardMaterial({
color:0xff0000
});

const player = new THREE.Mesh(playerGeo,playerMat);

player.castShadow = true;

player.position.y = 1;

scene.add(player);

function createPlatform(x,y,z,color){

  const geo = new THREE.BoxGeometry(4,1,4);

  const mat = new THREE.MeshStandardMaterial({
    color:color
  });

  const block = new THREE.Mesh(geo,mat);

  block.position.set(x,y,z);

  block.castShadow = true;

  block.receiveShadow = true;

  scene.add(block);

}

createPlatform(5,0,-5,0x333333);
createPlatform(10,2,-10,0x4444ff);
createPlatform(15,4,-15,0xffaa00);
createPlatform(20,6,-20,0xff00ff);

const goalGeo = new THREE.BoxGeometry(3,3,3);

const goalMat = new THREE.MeshStandardMaterial({
color:0xffff00,
emissive:0xffff00
});

const goal = new THREE.Mesh(goalGeo,goalMat);

goal.position.set(25,8,-25);

scene.add(goal);

let velocityY = 0;

let onGround = false;

const keys = {};

document.addEventListener("keydown",(e)=>{

  keys[e.key] = true;

  if(e.code=="Space" && onGround){

    velocityY = 0.25;

    onGround = false;

  }

});

document.addEventListener("keyup",(e)=>{

  keys[e.key] = false;

});

function animate(){

  requestAnimationFrame(animate);

  if(keys["w"] || keys["ArrowUp"])
    player.position.z -= 0.15;

  if(keys["s"] || keys["ArrowDown"])
    player.position.z += 0.15;

  if(keys["a"] || keys["ArrowLeft"])
    player.position.x -= 0.15;

  if(keys["d"] || keys["ArrowRight"])
    player.position.x += 0.15;

  velocityY -= 0.01;

  player.position.y += velocityY;

  if(player.position.y <= 1){

    player.position.y = 1;

    velocityY = 0;

    onGround = true;

  }

  camera.position.x = player.position.x;

  camera.position.y = player.position.y + 5;

  camera.position.z = player.position.z + 10;

  camera.lookAt(player.position);

  if(player.position.distanceTo(goal.position) < 3){

    alert("YOU WIN!");

    player.position.set(0,1,0);

  }

  renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>3D Obby</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      background: skyblue;
      font-family: Arial;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div id="ui">
  🎮 Roblox Style 3D Obby<br>
  Use WASD Keys
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// ============================
// SCENE
// ============================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);

// ============================
// CAMERA
// ============================

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, 6, 10);

// ============================
// RENDERER
// ============================

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

document.body.appendChild(renderer.domElement);

// ============================
// LIGHT
// ============================

const light = new THREE.DirectionalLight(0xffffff, 1);

light.position.set(5, 10, 7);

scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);

scene.add(ambient);

// ============================
// FLOOR
// ============================

const floorGeo = new THREE.BoxGeometry(50, 1, 50);

const floorMat = new THREE.MeshStandardMaterial({
  color: 0x44aa44
});

const floor = new THREE.Mesh(
  floorGeo,
  floorMat
);

floor.position.y = -1;

scene.add(floor);

// ============================
// ROBLOX BACON CHARACTER
// ============================

const player = new THREE.Group();

// BODY
const bodyGeo = new THREE.BoxGeometry(1.5, 2, 1);

const bodyMat = new THREE.MeshStandardMaterial({
  color: 0x2e8bff
});

const body = new THREE.Mesh(bodyGeo, bodyMat);

body.position.y = 1.5;

player.add(body);

// HEAD
const headGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);

const headMat = new THREE.MeshStandardMaterial({
  color: 0xffd7b5
});

const head = new THREE.Mesh(headGeo, headMat);

head.position.y = 3.2;

player.add(head);

// BACON HAIR
const hairGeo = new THREE.BoxGeometry(1.3, 0.4, 1.3);

const hairMat = new THREE.MeshStandardMaterial({
  color: 0xb85c2d
});

const hair = new THREE.Mesh(hairGeo, hairMat);

hair.position.y = 3.7;

player.add(hair);

// LEGS
const legGeo = new THREE.BoxGeometry(0.5, 1.5, 0.5);

const legMat = new THREE.MeshStandardMaterial({
  color: 0x2233aa
});

const leg1 = new THREE.Mesh(legGeo, legMat);
leg1.position.set(-0.4, 0, 0);

const leg2 = new THREE.Mesh(legGeo, legMat);
leg2.position.set(0.4, 0, 0);

player.add(leg1);
player.add(leg2);

// ARMS
const armGeo = new THREE.BoxGeometry(0.4, 1.5, 0.4);

const armMat = new THREE.MeshStandardMaterial({
  color: 0xffd7b5
});

const arm1 = new THREE.Mesh(armGeo, armMat);
arm1.position.set(-1.1, 1.5, 0);

const arm2 = new THREE.Mesh(armGeo, armMat);
arm2.position.set(1.1, 1.5, 0);

player.add(arm1);
player.add(arm2);

// PLAYER POSITION
player.position.y = 0;

scene.add(player);

// ============================
// GOAL
// ============================

const goalGeo = new THREE.BoxGeometry(2,2,2);

const goalMat = new THREE.MeshStandardMaterial({
  color: 0x00ff00,
  emissive: 0x00ff00
});

const goal = new THREE.Mesh(goalGeo, goalMat);

goal.position.set(10,1,0);

scene.add(goal);

// ============================
// CONTROLS
// ============================

const keys = {};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// ============================
// GAME LOOP
// ============================

function animate() {

  requestAnimationFrame(animate);

  // MOVEMENT
  if (keys["w"]) player.position.z -= 0.1;
  if (keys["s"]) player.position.z += 0.1;
  if (keys["a"]) player.position.x -= 0.1;
  if (keys["d"]) player.position.x += 0.1;

  // CAMERA FOLLOW
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;

  camera.lookAt(player.position);

  // WIN
  const dx =
    player.position.x - goal.position.x;

  const dz =
    player.position.z - goal.position.z;

  const dist = Math.sqrt(dx*dx + dz*dz);

  if (dist < 2) {

    alert("🎉 YOU WIN!");

    player.position.set(0,0,0);
  }

  renderer.render(scene, camera);
}

animate();

// ============================
// RESIZE
// ============================

window.addEventListener("resize", () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});

</script>

</body>
</html>
